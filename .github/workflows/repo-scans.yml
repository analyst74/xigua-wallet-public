name: Repo Scans

on:
  pull_request:
  push:

jobs:
  privacy-scan:
    name: Privacy scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run privacy scan
        run: ./scripts/run_privacy_scan.sh

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.0
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "${RUNNER_TEMP}/gitleaks.tar.gz"
          mkdir -p "${RUNNER_TEMP}/gitleaks-bin"
          tar -xzf "${RUNNER_TEMP}/gitleaks.tar.gz" -C "${RUNNER_TEMP}/gitleaks-bin"
          echo "${RUNNER_TEMP}/gitleaks-bin" >> "${GITHUB_PATH}"

      - name: Run gitleaks
        run: ./scripts/run_gitleaks.sh
