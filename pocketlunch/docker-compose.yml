name: pocketlunch

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pocketlunch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-pocketlunch}
    volumes:
      - pocketlunch_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pocketlunch} -d ${POSTGRES_DB:-pocketlunch}"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true
    networks:
      - data_net

  pocketlunch-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pocketlunch}:${POSTGRES_PASSWORD_URLENC:?POSTGRES_PASSWORD_URLENC is required}@postgres:5432/${POSTGRES_DB:-pocketlunch}
      LUNCH_MONEY_API_TOKEN: ${LUNCH_MONEY_API_TOKEN:?LUNCH_MONEY_API_TOKEN is required}
      LUNCH_MONEY_BASE_URL: ${LUNCH_MONEY_BASE_URL:-https://api.lunchmoney.dev}
      LM_DEFAULT_LOOKBACK_SECONDS: ${LM_DEFAULT_LOOKBACK_SECONDS:-300}
      LM_PULL_PAGE_SIZE: ${LM_PULL_PAGE_SIZE:-100}
      LM_OUTBOX_BATCH_SIZE: ${LM_OUTBOX_BATCH_SIZE:-100}
      LM_MAX_PUSH_ATTEMPTS: ${LM_MAX_PUSH_ATTEMPTS:-8}
    read_only: true
    init: true
    pids_limit: 256
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "65532:65532"
    healthcheck:
      test: ["CMD-SHELL", "/app/pocketlunch audit list --limit 1 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - app_net
      - data_net

  codex-runner:
    build:
      context: .
      dockerfile: Dockerfile.codex-runner
    restart: unless-stopped
    depends_on:
      pocketlunch-service:
        condition: service_healthy
    command: ["sh", "-lc", "sleep infinity"]
    environment:
      POCKETLUNCH_SERVICE_URL: ${POCKETLUNCH_SERVICE_URL:-http://pocketlunch-service:8080}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_HOME: /codex-home
    working_dir: /workspace/context
    volumes:
      - ./codex-context:/workspace/context:ro
      - codex_runner_home:/codex-home
    read_only: true
    init: true
    pids_limit: 128
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - app_net

volumes:
  pocketlunch_pg_data:
  codex_runner_home:

networks:
  app_net:
    driver: bridge
  data_net:
    driver: bridge
    internal: true
